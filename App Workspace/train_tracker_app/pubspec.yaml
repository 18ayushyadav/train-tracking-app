name: train_tracker_app
description: Where is My Train - Indian Railways offline-first tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & networking
  http: ^1.2.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # State management
  provider: ^6.1.1

  # Local storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # Maps (Leaflet-compatible via flutter_map)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location + cell tower
  permission_handler: ^11.1.0
  geolocator: ^11.0.0
  # telephony plugin for reading CellInfo (Android)
  telephony: ^0.2.0

  # i18n
  easy_localization: ^3.0.3

  # UI utilities
  google_fonts: ^6.1.0
  fl_chart: ^0.67.0          # Speed/ETA charts
  lottie: ^3.0.0             # Loading animations
  url_launcher: ^6.2.4
  package_info_plus: ^5.0.1
  connectivity_plus: ^5.0.2  # Monitor online/offline state
  workmanager: ^0.5.2        # Background tasks for alarms

  # Firebase (for auth & crowdsourcing)
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
    - assets/images/
    - assets/data/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
